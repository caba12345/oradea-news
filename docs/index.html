<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>📡 Radar Finanțări Oradea</title>
<style>
  :root{
    --bg:#f6f7f9; --card:#ffffff; --text:#1a1d21; --muted:#5c6470; --border:#e3e6ea;
    --rosu:#d92d20; --portocaliu:#ef8100; --galben:#c9a800; --verde:#12905e;
  }
  @media (prefers-color-scheme: dark){
    :root{ --bg:#101215; --card:#1a1e23; --text:#e8eaed; --muted:#9aa3ad; --border:#2a2f36;
           --galben:#e6c400; }
  }
  *{box-sizing:border-box; margin:0}
  body{background:var(--bg); color:var(--text); font:16px/1.55 -apple-system,'Segoe UI',Roboto,sans-serif; padding:24px 16px 64px; max-width:860px; margin:0 auto}
  h1{font-size:1.45rem; margin-bottom:4px}
  .sub{color:var(--muted); font-size:.9rem; margin-bottom:20px}
  .filters{display:flex; flex-wrap:wrap; gap:8px; margin-bottom:20px}
  .chip{border:1px solid var(--border); background:var(--card); color:var(--text); border-radius:999px; padding:5px 14px; font-size:.85rem; cursor:pointer; user-select:none}
  .chip.on{outline:2px solid currentColor}
  .chip .dot{display:inline-block; width:9px; height:9px; border-radius:50%; margin-right:6px}
  .card{background:var(--card); border:1px solid var(--border); border-left:5px solid var(--border); border-radius:10px; padding:14px 16px; margin-bottom:12px}
  .card.rosu{border-left-color:var(--rosu)} .card.portocaliu{border-left-color:var(--portocaliu)}
  .card.galben{border-left-color:var(--galben)} .card.verde{border-left-color:var(--verde)}
  .meta{font-size:.78rem; color:var(--muted); display:flex; gap:10px; flex-wrap:wrap; margin-bottom:6px; text-transform:uppercase; letter-spacing:.03em}
  .badge{font-weight:700}
  .badge.rosu{color:var(--rosu)} .badge.portocaliu{color:var(--portocaliu)}
  .badge.galben{color:var(--galben)} .badge.verde{color:var(--verde)}
  .title{font-weight:650; margin-bottom:6px}
  .summary{font-size:.93rem; margin-bottom:8px}
  .why{font-size:.9rem; background:color-mix(in srgb, var(--border) 40%, transparent); border-radius:8px; padding:8px 10px; margin-bottom:8px}
  .why b{font-weight:650}
  a{color:inherit}
  .src{font-size:.8rem; color:var(--muted)}
  .empty{color:var(--muted); text-align:center; padding:40px 0}
  .topbar{display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap}
  .refresh{border:1px solid var(--border); background:var(--card); color:var(--text); border-radius:8px; padding:8px 16px; font-size:.9rem; cursor:pointer}
  .refresh:active{transform:scale(.97)}
</style>
</head>
<body>
<div class="topbar">
  <h1>📡 Radar Finanțări Oradea</h1>
  <button class="refresh" id="refreshBtn" onclick="refreshData()">🔄 Actualizează</button>
</div>
<div class="sub" id="sub">se încarcă…</div>
<div class="filters" id="sevFilters"></div>
<div class="filters" id="catFilters"></div>
<div id="list"></div>

<script src="data.js"></script>
<script>
const SEV = [
  ["rosu","🔴 Foarte important"], ["portocaliu","🟠 Important"],
  ["galben","🟡 De urmărit"], ["verde","🟢 Context"]
];
const CAT = [
  ["sun","🚨 Start-Up Nation"], ["finantari","💰 Finanțări"],
  ["oradea","📍 Oradea"], ["alte","📚 Alte oportunități"]
];
const sevRank = {rosu:0, portocaliu:1, galben:2, verde:3};
let items = (window.RADAR_ITEMS||[]);
let sevOn = new Set(SEV.map(s=>s[0])), catOn = new Set(CAT.map(c=>c[0]));

function refreshData(){
  const btn = document.getElementById('refreshBtn');
  btn.disabled = true; btn.textContent = '⏳ se actualizează…';
  const s = document.createElement('script');
  s.src = 'data.js?t=' + Date.now();   // query nou = ocolește cache-ul CDN
  s.onload = ()=>{ items = (window.RADAR_ITEMS||[]); render(); btn.disabled=false; btn.textContent='🔄 Actualizează'; };
  s.onerror = ()=>{ btn.disabled=false; btn.textContent='⚠️ eroare — reîncearcă'; };
  document.body.appendChild(s);
}

function chips(el, defs, set, colorClass){
  defs.forEach(([key,label])=>{
    const c = document.createElement('span');
    c.className = 'chip on'; c.innerHTML = label;
    c.onclick = ()=>{ set.has(key) ? set.delete(key) : set.add(key); c.classList.toggle('on'); render(); };
    document.getElementById(el).appendChild(c);
  });
}
function render(){
  const list = document.getElementById('list'); list.innerHTML='';
  const show = items
    .filter(i=>sevOn.has(i.sev) && catOn.has(i.cat))
    .sort((a,b)=> (sevRank[a.sev]-sevRank[b.sev]) || (b.date+'' ).localeCompare(a.date));
  if(!show.length){ list.innerHTML = '<div class="empty">Nimic pe filtrele curente.</div>'; return; }
  const sevLabel = Object.fromEntries(SEV), catLabel = Object.fromEntries(CAT);
  show.forEach(i=>{
    const d = document.createElement('div');
    d.className = 'card '+i.sev;
    d.innerHTML = `
      <div class="meta"><span class="badge ${i.sev}">${sevLabel[i.sev]||i.sev}</span>
        <span>${catLabel[i.cat]||i.cat}</span><span>radar: ${i.date}</span><span>publicat: ${i.pub||'?'}</span></div>
      <div class="title">${i.title}</div>
      <div class="summary">${i.summary}</div>
      <div class="why"><b>De ce contează:</b> ${i.why}</div>
      <div class="src">Sursa: <a href="${i.url}" target="_blank" rel="noopener">${i.source||i.url}</a></div>`;
    list.appendChild(d);
  });
  const last = items.length ? items.map(i=>i.date).sort().slice(-1)[0] : '—';
  document.getElementById('sub').textContent =
    `${items.length} știri în radar · ultima actualizare: ${last} · rulează luni/miercuri/vineri ~08:00`;
}
chips('sevFilters', SEV, sevOn); chips('catFilters', CAT, catOn); render();
</script>
</body>
</html>
